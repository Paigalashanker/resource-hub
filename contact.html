 <!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>Contact — ALDS Portfolio</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo">ALDS</div>
        <div class="tag">Contact</div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="downloads.html" class="nav-link">Downloads</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <button class="hamburger" id="menuToggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <!-- HERO / TITLE -->
  <main class="container">

    <section class="hero" style="padding: 60px 0 30px;">
      <h1>
        Get In <span class="highlight">Touch</span>
      </h1>
      <p class="lead">
        Reach out privately and directly.  
        This form opens your email client — no data stored anywhere.
      </p>
    </section>

    <!-- CONTACT FORM CARD -->
    <section class="card" style="margin-top: 25px; padding: 32px;">
      <h2 style="font-family:'Inter',sans-serif; font-size:28px; margin-bottom:16px;">
        Contact Form
      </h2>

      <form action="https://formsubmit.co/paigalashanker@gmail.com" method="POST">

        <!-- Disable CAPTCHA (optional but cleaner) -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect after submission (optional) -->
        <input type="hidden" name="_next" value="https://your-website-url-here/contact.html">

        <label style="display:block; margin-bottom:16px; font-weight:600;">
          Subject
          <input 
            name="subject" 
            placeholder="Subject"
            required
            style="
              width:100%; 
              padding:12px; 
              margin-top:6px;
              border-radius:12px; 
              border:1px solid #ddd;
              font-size:16px;
              -webkit-appearance:none;
            "
          >
        </label>

        <label style="display:block; margin-bottom:18px; font-weight:600;">
          Message
          <textarea 
            name="message" 
            placeholder="Write your message..."
            required
            style="
              width:100%; 
              height:140px; 
              padding:12px; 
              margin-top:6px;
              border-radius:12px; 
              border:1px solid #ddd;
              font-size:16px; 
              resize:vertical;
              -webkit-appearance:none;
            "
          ></textarea>
        </label>

        <button class="btn" type="submit">Send Message</button>

      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div>AI & DS Student • SREC • 2024–2028</div>
    </div>
  </footer>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-left">
      <span>Ready</span>
    </div>
    <div class="status-right">
      <span>UTF-8</span>
      <span>LF</span>
      <span>JavaScript</span>
      <span>Go Live</span>
    </div>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
