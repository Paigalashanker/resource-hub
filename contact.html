  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Contact — ALDS Portfolio</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo">ALDS</div>
        <div class="tag">Contact</div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="downloads.html" class="nav-link">Downloads</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <button class="hamburger" id="menuToggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <!-- HERO / TITLE -->
  <main class="container">

    <section class="hero" style="padding: 60px 0 30px;">
      <h1>
        Get In <span class="highlight">Touch</span>
      </h1>
      <p class="lead">
        Reach out privately and directly.  
        This form opens your email client — no data stored anywhere.
      </p>
    </section>

    <!-- CONTACT FORM CARD -->
    <section class="card fade-in" style="margin-top: 25px; padding: 36px;">
      <h2>Contact Form</h2>

      <form action="https://formsubmit.co/paigalashanker@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://your-website-url-here/contact.html">

        <div class="form-group">
          <label for="subject">Subject</label>
          <input id="subject" name="subject" class="form-input" placeholder="What's this about?" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" class="form-input" placeholder="Write your message..." required></textarea>
        </div>

        <button class="btn" type="submit">Send Message</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-dev">
        Developed & Maintained by
        <a href="https://github.com/Paigalashanker" target="_blank" rel="noopener noreferrer">Paigala Delli Sankar</a>
      </div>
      <div class="footer-meta">AI & DS • 2nd Year • SREC (2024–2028)</div>
    </div>
  </footer>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-left">
      <span>Ready</span>
    </div>
    <div class="status-right">
      <span>UTF-8</span>
      <span>LF</span>
      <span>JavaScript</span>
      <span>Go Live</span>
    </div>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
